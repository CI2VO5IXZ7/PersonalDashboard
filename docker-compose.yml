services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_dashboard
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/personal_dashboard?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-this-in-production
      AUTH_SECRET: change-this-in-production
      TICKTICK_CLIENT_ID: ${TICKTICK_CLIENT_ID:-}
      TICKTICK_CLIENT_SECRET: ${TICKTICK_CLIENT_SECRET:-}
      TICKTICK_REDIRECT_URI: http://localhost:3000/api/integrations/ticktick/callback
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
